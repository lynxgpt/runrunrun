# ─────────────────────────────────────────────────────────────────────────────
# site.yaml — all user-editable text for the site.
# Edit this file, commit + push → GitHub Actions rebuilds in ~90 seconds.
# ─────────────────────────────────────────────────────────────────────────────

# ── HEADER ────────────────────────────────────────────────────────────────────
# The large title shown at the top of the page.
# Supports: plain text, any length.
header:
  name: "RUN RUN RUN"

# ── FOREWORD ──────────────────────────────────────────────────────────────────
# Prose shown below the streak hero numbers.
# Supports: any number of paragraphs (add or remove "- ..." lines freely).
# Inline `backtick code` is rendered in a monospace style.
# No bold, italic, or links — plain text + backtick only.
foreword:
  - "This is my running log. Although at this moment I still haven't figured out the point of running, I have already gone quite far..."

# ── FOOTER ────────────────────────────────────────────────────────────────────
# Lines shown at the bottom of the page.
# Supports: any number of lines. Each line has:
#   text: (required) the display text
#   url:  (optional) makes the line a clickable link
footer:
  - text: "Replicated from "
    linkText: "nodaysoff.run"
    url: "https://nodaysoff.run"
  - text: "Map imagery: "
    linkText: "Powered by Esri"
    url: "https://www.esri.com/"
