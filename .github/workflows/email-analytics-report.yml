name: Daily Analytics Report

on:
  schedule:
    # GitHub cron is UTC. Run hourly and gate below so 06:00 stays correct
    # across New York daylight-saving changes.
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check local report hour
        id: report_time
        if: github.event_name == 'schedule'
        run: |
          if [ "$(TZ=America/New_York date +%H)" = "06" ]; then
            echo "send=true" >> "$GITHUB_OUTPUT"
          else
            echo "send=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish report
        if: github.event_name == 'workflow_dispatch' || steps.report_time.outputs.send == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RUN_LOGS_TOKEN: ${{ secrets.RUN_LOGS_TOKEN }}
          RUN_LOGS_REPO: lynxgpt/run_logs
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ANALYTICS_REPORT_TO: ${{ secrets.ANALYTICS_REPORT_TO }}
          ANALYTICS_REPORT_FROM: ${{ secrets.ANALYTICS_REPORT_FROM }}
        run: node scripts/send-analytics-report.mjs
